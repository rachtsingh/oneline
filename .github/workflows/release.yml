name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -scheme OneLine -resolvePackageDependencies -derivedDataPath build/DerivedData

      - name: Build
        run: |
          xcodebuild archive \
            -scheme OneLine \
            -configuration Release \
            -archivePath build/OneLine.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}"

      - name: Extract app from archive
        run: cp -R build/OneLine.xcarchive/Products/Applications/OneLine.app build/OneLine.app

      - name: Create DMG
        run: bash scripts/create-dmg.sh build/OneLine.app

      - name: Sign update with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN=$(find build/DerivedData/SourcePackages/artifacts -path "*/Sparkle/bin" -type d | head -1)
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIG=$("$SPARKLE_BIN/sign_update" OneLine-*.dmg -f /tmp/sparkle_key)
          rm /tmp/sparkle_key
          echo "$SIG" > sparkle_signature.txt
          cat sparkle_signature.txt

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN=$(find build/DerivedData/SourcePackages/artifacts -path "*/Sparkle/bin" -type d | head -1)
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          mkdir -p appcast_dir
          cp OneLine-*.dmg appcast_dir/
          "$SPARKLE_BIN/generate_appcast" --ed-key-file /tmp/sparkle_key appcast_dir
          rm /tmp/sparkle_key
          cp appcast_dir/appcast.xml .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OneLine-*.dmg
            appcast.xml
          generate_release_notes: true
